<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Cortes - Sua Senha</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Oswald', sans-serif; 
            text-align: center; 
            padding: 20px; 
            margin: 0;
            color: #fff;
            /* Fundo preto profundo com textura de poeira dourada sutil */
            background-color: #000;
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                              url('https://www.transparenttextures.com/patterns/stardust.png');
            background-attachment: fixed;
        }

        /* Ajuste para a logo não parecer um bloco separado */
        .logo-img { 
            max-width: 220px; 
            margin-top: 30px; 
            margin-bottom: 20px;
            display: inline-block;
        }

        .card { 
            background: rgba(15, 15, 15, 0.95); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 35px; 
            border-radius: 15px; 
            border: 2px solid #ffca28; 
            max-width: 350px; 
            margin: 10px auto; 
            box-shadow: 0 0 30px rgba(255, 202, 40, 0.1); 
        }

        p { color: #ffca28; font-weight: bold; font-size: 18px; margin-top: 0; text-transform: uppercase; letter-spacing: 1px; }

        input { 
            padding: 15px; 
            width: 90%; 
            border: 1px solid #333; 
            border-radius: 5px; 
            background: #111; 
            color: #fff; 
            font-size: 16px; 
            margin-bottom: 20px; 
            font-family: 'Oswald', sans-serif; 
            text-align: center;
            text-transform: uppercase;
        }
        input:focus { border-color: #ffca28; outline: none; }

        button { 
            background: #ffca28; 
            color: #000; 
            border: none; 
            padding: 18px; 
            font-size: 20px; 
            border-radius: 5px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: bold; 
            text-transform: uppercase; 
            font-family: 'Oswald', sans-serif; 
            box-shadow: 0 4px 0px #b8860b;
        }
        button:active { transform: translateY(3px); box-shadow: none; }

        .senha-grande { font-size: 90px; color: #fff; margin: 10px 0; font-weight: bold; }
        .status { padding: 15px; border-radius: 5px; background: #111; color: #ffca28; border: 1px solid #333; font-size: 14px; }
        .cancelar { background: transparent; color: #555; margin-top: 25px; border: none; cursor: pointer; text-decoration: underline; font-size: 12px; }
    </style>
</head>
<body>
    <img src="logo.png" alt="Dr. Cortes" class="logo-img">
    
    <div class="card">
        <div id="telaRegistro">
            <p>BEM-VINDO À DR. CORTES</p>
            <input type="text" id="nome" placeholder="DIGITE SEU NOME">
            <button onclick="gerarSenha()">PEGAR MINHA SENHA</button>
        </div>

        <div id="telaAcompanhamento" style="display:none;">
            <p style="color: #666; font-size: 14px;">SUA SENHA</p>
            <div class="senha-grande" id="minhaSenha">--</div>
            <div id="statusTexto" class="status">AGUARDANDO...</div>
            <button class="cancelar" onclick="sairDaFila()">CANCELAR SENHA</button>
        </div>
    </div>

    <script>
        const API = "https://fila-drcortes.onrender.com";
        
        async function gerarSenha() {
            const nome = document.getElementById("nome").value;
            if(!nome) return alert("Digite seu nome.");
            const res = await fetch(`${API}/gerar`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ nome })
            });
            const data = await res.json();
            localStorage.setItem("drCortesSenha", data.senha);
            mostrarAcompanhamento(data.senha);
        }

        function mostrarAcompanhamento(senha) {
            document.getElementById("telaRegistro").style.display = "none";
            document.getElementById("telaAcompanhamento").style.display = "block";
            document.getElementById("minhaSenha").innerText = senha;
            atualizarStatus();
        }

        async function atualizarStatus() {
            let senhaSalva = localStorage.getItem("drCortesSenha");
            if (!senhaSalva) return;
            try {
                const resFila = await fetch(`${API}/fila`);
                const fila = await resFila.json();
                const resStatus = await fetch(`${API}/status`);
                const statusGlobal = await resStatus.json();

                const dadosSenha = fila.find(s => s.senha == senhaSalva);
                const estaSendoAtendido = statusGlobal.atual && statusGlobal.atual.senha == senhaSalva;

                if (!dadosSenha && !estaSendoAtendido) {
                    localStorage.removeItem("drCortesSenha");
                    location.reload();
                    return;
                }

                if (estaSendoAtendido) {
                    document.getElementById("statusTexto").innerHTML = "🔥 É A SUA VEZ!";
                    document.getElementById("statusTexto").style.background = "#ffca28";
                    document.getElementById("statusTexto").style.color = "#000";
                } else {
                    const posicao = fila.filter(s => s.status === "espera" && s.senha < senhaSalva).length;
                    document.getElementById("statusTexto").innerText = `FALTAM ${posicao} PESSOAS`;
                }
            } catch (e) { console.log("Erro de conexão"); }
        }

        setInterval(atualizarStatus, 3000);
        if(localStorage.getItem("drCortesSenha")) mostrarAcompanhamento(localStorage.getItem("drCortesSenha"));

        function sairDaFila() {
            if(confirm("Deseja cancelar?")) { localStorage.removeItem("drCortesSenha"); location.reload(); }
        }
    </script>
</body>
</html>
