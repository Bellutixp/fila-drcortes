<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Cortes - Cliente</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Oswald', sans-serif; text-align: center; padding: 20px; background: #000; color: #fff; }
        .logo { max-width: 180px; margin-bottom: 20px; }
        .box { background: #111; padding: 30px; border-radius: 15px; border: 2px solid #ffca28; max-width: 350px; margin: 0 auto; }
        input { width: 90%; padding: 15px; margin-bottom: 20px; border-radius: 5px; border: 1px solid #333; background: #222; color: #fff; font-size: 18px; text-align: center; }
        button { background: #ffca28; color: #000; border: none; padding: 18px; font-size: 18px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        
        /* Estilos do Ticket */
        #resultado { display: none; }
        .numero-senha { font-size: 80px; color: #ffca28; margin: 10px 0; }
        .status-box { background: #222; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #444; }
        
        /* AVISO DE VÁ PARA A CADEIRA */
        .aviso-suavez { 
            display: none; 
            background: #ffca28; 
            color: #000; 
            padding: 15px; 
            border-radius: 8px; 
            font-size: 22px; 
            font-weight: bold; 
            margin-top: 20px;
            animation: piscar 1s infinite;
        }
        @keyframes piscar { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <img src="logo.png" class="logo">

    <div class="box">
        <div id="formulario">
            <h2>PEGAR SENHA</h2>
            <input type="text" id="nomeCliente" placeholder="Seu Nome">
            <button onclick="pegarSenha()">GERAR SENHA</button>
        </div>

        <div id="resultado">
            <p style="margin:0; color:#888;">SUA SENHA É:</p>
            <div class="numero-senha" id="txtSuaSenha">00</div>
            
            <div id="statusNormal" class="status-box">
                <p style="margin:0; font-size:14px; color:#888;">ATENDENDO AGORA:</p>
                <span id="txtSenhaPainel" style="color:#ffca28; font-size:24px; font-weight:bold;">--</span>
            </div>

            <div id="avisoVez" class="aviso-suavez">
                🚀 SUA VEZ!<br>VÁ PARA A CADEIRA
            </div>

            <button onclick="location.reload()" style="margin-top:30px; background:#333; color:#fff; font-size:12px; width: auto; padding: 10px 20px;">SAIR DA FILA</button>
        </div>
    </div>

    <script>
        const API = "https://fila-drcortes.onrender.com";
        let minhaSenhaSalva = null;

        async function pegarSenha() {
            const nome = document.getElementById("nomeCliente").value;
            if(!nome) return alert("Digite seu nome!");

            try {
                const res = await fetch(API + "/gerar", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ nome: nome })
                });
                const dados = await res.json();

                minhaSenhaSalva = dados.suaSenha;
                document.getElementById("txtSuaSenha").innerText = minhaSenhaSalva;
                document.getElementById("txtSenhaPainel").innerText = "#" + dados.atendimentoAgora;

                document.getElementById("formulario").style.display = "none";
                document.getElementById("resultado").style.display = "block";

                // Começa a vigiar a fila para ver se é a vez dele
                setInterval(vigiarFila, 4000);

            } catch (e) { alert("Erro ao conectar."); }
        }

        async function vigiarFila() {
            if (!minhaSenhaSalva) return;

            try {
                const res = await fetch(API + "/painel");
                const dados = await res.json();
                
                const senhaNoPainel = dados.atual ? dados.atual.senha : null;
                document.getElementById("txtSenhaPainel").innerText = senhaNoPainel ? "#" + senhaNoPainel : "Aguardando";

                // SE A SENHA NO PAINEL FOR A MINHA SENHA:
                if (senhaNoPainel == minhaSenhaSalva) {
                    document.getElementById("statusNormal").style.display = "none";
                    document.getElementById("avisoVez").style.display = "block";
                    
                    // Se o navegador permitir, ele dá um alerta vibrando
                    if (navigator.vibrate) navigator.vibrate(500);
                } else {
                    document.getElementById("statusNormal").style.display = "block";
                    document.getElementById("avisoVez").style.display = "none";
                }
            } catch (e) { console.log("Erro ao atualizar fila"); }
        }
    </script>
</body>
</html>
