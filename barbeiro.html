<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Cortes - Barbeiro</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Oswald', sans-serif; text-align: center; padding: 20px; background: #000; color: #fff; }
        .card { background: #111; padding: 25px; border-radius: 15px; border: 2px solid #ffca28; max-width: 400px; margin: 0 auto; }
        .atendimento-box { background: #0a0a0a; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333; }
        .nome-foco { font-size: 30px; color: #ffca28; display: block; text-transform: uppercase; }
        button { background: #ffca28; color: #000; border: none; padding: 18px; font-size: 18px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 10px; }
        .lista { text-align: left; margin-top: 20px; padding: 10px; background: #050505; border-radius: 8px; max-height: 200px; overflow-y: auto; border: 1px solid #222; }
        ul { list-style: none; padding: 0; }
        li { padding: 10px; border-bottom: 1px solid #222; color: #bbb; }
    </style>
</head>
<body>

    <h2 style="color:#ffca28">PAINEL DO BARBEIRO</h2>
    
    <div class="card">
        <div class="atendimento-box">
            <p style="margin:0; font-size:11px; color:#666;">ATENDENDO AGORA:</p>
            <span id="nomeAtual" class="nome-foco">---</span>
        </div>

        <button onclick="proximo()">🔔 CHAMAR PRÓXIMO</button>
        <button style="background:#333; color:#fff;" onclick="finalizar()">✅ FINALIZAR</button>
        
        <div class="lista">
            <p style="color:#ffca28; font-size:12px; margin:0;">FILA DE ESPERA:</p>
            <ul id="listaEspera"></ul>
        </div>

        <button onclick="resetTotal()" style="background:none; color:red; font-size:10px; margin-top:20px; border:1px solid red; width:auto; padding:5px;">REINICIAR TUDO</button>
    </div>

    <script>
        const API = "https://fila-drcortes.onrender.com"; // VERIFIQUE SE ESTÁ EXATAMENTE ASSIM

        async function atualizar() {
            try {
                // Pega quem está sendo atendido
                const resP = await fetch(`${API}/painel`);
                const p = await resP.json();
                document.getElementById("nomeAtual").innerText = p.atual ? `#${p.atual.senha} - ${p.atual.nome}` : "VAZIO";

                // Pega a fila de espera
                const resF = await fetch(`${API}/fila`);
                const f = await resF.json();
                let html = "";
                f.forEach(s => {
                    if(s.status === "espera") html += `<li>#${s.senha} - ${s.nome}</li>`;
                });
                document.getElementById("listaEspera").innerHTML = html || "<li>Fila vazia</li>";
            } catch (e) {
                console.log("Erro ao conectar na API");
            }
        }

        async function proximo() {
            await fetch(`${API}/chamar`, { method: "POST" });
            atualizar();
        }

        async function finalizar() {
            const atual = document.getElementById("nomeAtual").innerText;
            if(atual === "VAZIO") return;
            const senha = atual.split(" ")[0].replace("#", "");
            await fetch(`${API}/finalizar`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ senha: senha })
            });
            atualizar();
        }

        async function resetTotal() {
            if(confirm("Zerar tudo?")) {
                await fetch(`${API}/reiniciar`, { method: "POST" });
                location.reload();
            }
        }

        setInterval(atualizar, 3000);
        atualizar();
    </script>
</body>
</html>
