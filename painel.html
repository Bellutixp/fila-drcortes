<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Cortes - Painel</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Oswald', sans-serif; 
            text-align: center; 
            padding: 40px; 
            margin: 0;
            color: #fff;
            background-color: #000;
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                              url('https://www.transparenttextures.com/patterns/stardust.png');
            background-attachment: fixed;
            overflow: hidden;
        }

        .logo-tv { max-width: 300px; margin-bottom: 20px; }

        .foco-painel {
            background: rgba(15, 15, 15, 0.95);
            border: 3px solid #ffca28;
            border-radius: 30px;
            padding: 50px;
            max-width: 800px;
            margin: 0 auto;
            box-shadow: 0 0 50px rgba(255, 202, 40, 0.2);
        }

        .titulo-chamada { color: #ffca28; font-size: 40px; text-transform: uppercase; margin: 0; }
        .senha-atual { font-size: 200px; font-weight: bold; margin: 20px 0; line-height: 1; }
        .nome-atual { font-size: 60px; color: #ffca28; text-transform: uppercase; }

        .historico {
            margin-top: 50px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .hist-item {
            background: #111;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
            min-width: 150px;
        }

        .hist-senha { font-size: 30px; display: block; color: #888; }
    </style>
</head>
<body>
    <img src="logo.png" alt="Dr. Cortes" class="logo-tv">
    
    <div class="foco-painel">
        <p class="titulo-chamada">SENHA ATUAL</p>
        <div id="senhaDestaque" class="senha-atual">--</div>
        <div id="nomeDestaque" class="nome-atual">AGUARDANDO</div>
    </div>

    <div class="historico" id="historico">
        </div>

    <script>
        const API = "https://fila-drcortes.onrender.com";
        let ultimaSenhaChamada = null;

        async function atualizarPainel() {
            try {
                const res = await fetch(`${API}/status`);
                const data = await res.json();

                if (data.atual) {
                    const senhaTexto = `#${data.atual.senha}`;
                    document.getElementById("senhaDestaque").innerText = senhaTexto;
                    document.getElementById("nomeDestaque").innerText = data.atual.nome;

                    // Tocar som se a senha mudar (opcional)
                    if (ultimaSenhaChamada !== data.atual.senha) {
                        ultimaSenhaChamada = data.atual.senha;
                        // const audio = new Audio('chamada.mp3'); audio.play();
                    }
                }

                const histDiv = document.getElementById("historico");
                histDiv.innerHTML = "";
                data.historico.slice(1, 4).forEach(h => {
                    const item = document.createElement("div");
                    item.className = "hist-item";
                    item.innerHTML = `<span class="hist-senha">#${h.senha}</span><span style="font-size:14px">${h.nome}</span>`;
                    histDiv.appendChild(item);
                });
            } catch (e) { console.log("Erro no painel"); }
        }

        setInterval(atualizarPainel, 3000);
        atualizarPainel();
    </script>
</body>
</html>
